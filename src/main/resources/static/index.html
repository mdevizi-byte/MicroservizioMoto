<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MicroservizioMoto</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f6f8fb;
      color: #1f2937;
    }
    .card {
      background: white;
      padding: 2rem 2.5rem;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      max-width: 560px;
    }
    h1 { margin-top: 0; }
    code {
      background: #eef2ff;
      padding: 0.15rem 0.35rem;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>MicroservizioMoto</h1>
    <p>Il progetto è online. Se vedi questa pagina, il server Spring Boot sta rispondendo correttamente.</p>
    <p>Swagger UI: <code>/swagger-ui/index.html</code></p>
    <p>Porta configurata: <code>8082</code></p>
  </main>
</body>
</html>
